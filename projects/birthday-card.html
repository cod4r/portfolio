<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Butterfly Surprise for me</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(to top right, #fdf6f0, #ffeef7);
  font-family: "Segoe UI", sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.card-container {
  perspective: 1200px;
  width: 100%;
  max-width: 100%;
  padding: 24px;
  box-sizing: border-box;
}

.card {
  width: min(90vw, 400px);
  height: 300px;
  margin: 0 auto;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s ease;
  cursor: pointer;
}

.card.opened {
  transform: rotateY(180deg);
}

.front,
.back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 22px;
  box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
}

.front {
  background:
    radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 34%),
    radial-gradient(circle at bottom right, rgba(255, 182, 193, 0.38), transparent 30%),
    linear-gradient(135deg, #ff91af 0%, #ffb7cb 45%, #ffdbe7 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  color: #fff;
  text-shadow: 0 2px 10px rgba(106, 26, 62, 0.28);
  overflow: hidden;
}

.front::before,
.front::after {
  content: "";
  position: absolute;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.14);
  filter: blur(8px);
}

.front::before {
  top: -38px;
  left: -28px;
}

.front::after {
  right: -34px;
  bottom: -42px;
}

.front-design {
  position: relative;
  width: 124px;
  height: 90px;
}

.wing {
  position: absolute;
  top: 8px;
  width: 54px;
  height: 72px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(255, 233, 240, 0.74));
  border: 2px solid rgba(255, 255, 255, 0.45);
  box-shadow: 0 10px 20px rgba(146, 47, 91, 0.15);
}

.wing-left {
  left: 6px;
  border-radius: 80% 18% 70% 24%;
  transform: rotate(-18deg);
}

.wing-right {
  right: 6px;
  border-radius: 18% 80% 24% 70%;
  transform: rotate(18deg);
}

.body-line {
  position: absolute;
  left: 50%;
  top: 6px;
  width: 8px;
  height: 76px;
  border-radius: 999px;
  background: linear-gradient(180deg, #ff4f8d, #c82d67);
  transform: translateX(-50%);
}

.front-text {
  position: relative;
  z-index: 1;
  padding: 12px 22px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.24);
  border: 1px solid rgba(255, 255, 255, 0.35);
  font-size: 24px;
  font-weight: 700;
}

.back {
  background: #fff0f5;
  transform: rotateY(180deg);
  padding: 20px;
  box-sizing: border-box;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.message {
  max-width: 320px;
  font-family: "Brush Script MT", cursive;
  font-size: 20px;
  line-height: 1.45;
  color: #a0522d;
  text-align: center;
}

.message strong {
  color: #d63384;
}

.butterfly {
  width: 40px;
  height: 40px;
  background: url("https://i.imgur.com/wbQy1EK.png") center/contain no-repeat;
  position: absolute;
  animation: fly 4s ease-out forwards;
  pointer-events: none;
}

@keyframes fly {
  0% {
    transform: translate(0, 0) scale(0.5) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translate(calc(-200px + 400px * var(--randX)), -400px) scale(1) rotate(720deg);
    opacity: 0;
  }
}

.instruction {
  margin-top: 16px;
  font-size: 14px;
  color: #333;
  text-align: center;
}

#musicIcon {
  position: fixed;
  bottom: 20px;
  left: 20px;
  display: flex;
  gap: 4px;
  z-index: 999;
}

#musicIcon span {
  width: 5px;
  height: 20px;
  background: #ff69b4;
  animation: bounce 1s infinite ease-in-out;
  animation-delay: calc(var(--i) * 0.1s);
  border-radius: 3px;
}

#musicIcon span:nth-child(1) { --i: 1; }
#musicIcon span:nth-child(2) { --i: 2; }
#musicIcon span:nth-child(3) { --i: 3; }
#musicIcon span:nth-child(4) { --i: 4; }

@keyframes bounce {
  0%,
  100% {
    transform: scaleY(0.6);
  }
  50% {
    transform: scaleY(1.6);
  }
}

@media (max-width: 500px) {
  .card {
    height: 280px;
  }

  .front-text {
    font-size: 20px;
    padding: 10px 18px;
  }

  .message {
    font-size: 18px;
  }
}

</style>
</head>
<body>

<div class="card-container">
  <div class="card" onclick="toggleCard(this)">
    <div class="front">
      <div class="front-design" aria-hidden="true">
        <span class="wing wing-left"></span>
        <span class="wing wing-right"></span>
        <span class="body-line"></span>
      </div>
      <div class="front-text">Tap to Open</div>
    </div>
    <div class="back">
      <div class="message">
        "Like butterflies in spring,<br>
        you bring beauty wherever you go."<br><br>
        <strong>Happy Krishna Consciousness Birthday, Me!</strong><br>
        Wishing you a magical day full of color and joy.<br><br>
        With love, <strong>Radhe</strong>
      </div>
    </div>
  </div>
  <div class="instruction">(Tap card to open/close)</div>
</div>

<audio id="birthdayMusic" src="birthday card/HAPPY BIRTHDAY INSTRUMENTAL ( LOFI VERSION ) - Benote.mp3" preload="auto"></audio>

<div id="musicIcon" aria-hidden="true">
  <span></span><span></span><span></span><span></span>
</div>

<script>
let musicPlayed = false;

function toggleCard(card) {
  card.classList.toggle('opened');

  if (card.classList.contains('opened')) {
    // Play music once
    if (!musicPlayed) {
      const music = document.getElementById('birthdayMusic');
      music.play();
      musicPlayed = true;
    }

    // Butterflies fly out
    const rect = card.getBoundingClientRect();
    const startX = rect.left + rect.width / 2;
    const startY = rect.top + rect.height / 2;

    for (let i = 0; i < 8; i++) {
      const butterfly = document.createElement('div');
      butterfly.className = 'butterfly';
      butterfly.style.setProperty('--randX', Math.random());
      butterfly.style.left = `${startX}px`;
      butterfly.style.top = `${startY}px`;
      document.body.appendChild(butterfly);
      setTimeout(() => butterfly.remove(), 4000);
    }
  }
}

</script>

</body>
</html>
